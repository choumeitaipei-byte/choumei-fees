<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>洲美扶輪社 — 帳單查看</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #002147;
    --navy-mid: #003366;
    --gold: #C9A84C;
    --cream: #faf7f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
  body { background: var(--cream); min-height: 100vh; padding: 20px 16px 40px; }
  .mono { font-family: 'DM Mono', monospace; }

  .header { text-align: center; padding: 20px 0 28px; }
  .header-badge { background: var(--navy); color: var(--gold); padding: 4px 16px; border-radius: 99px; font-size: 11px; font-weight: 900; letter-spacing: 0.15em; display: inline-block; margin-bottom: 10px; }
  .header-title { font-size: 15px; color: #888; font-weight: 500; }

  .bill-card { background: white; border-radius: 24px; max-width: 480px; margin: 0 auto; overflow: hidden; box-shadow: 0 8px 40px rgba(0,33,71,0.12); }

  .bill-top { background: var(--navy); padding: 24px; color: white; }
  .bill-month { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.05em; }
  .bill-member-name { font-size: 28px; font-weight: 900; line-height: 1; }
  .bill-member-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; }

  .bill-body { padding: 0; }

  .section-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #aaa; padding: 14px 20px 6px; }

  .bill-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #f5f2ec; }
  .bill-row-label { font-size: 13px; color: #444; }
  .bill-row-amount { font-size: 14px; font-weight: 700; }
  .bill-row.credit { color: #16a34a; }
  .bill-row.credit .bill-row-amount::before { content: '−'; }

  .subtotal { background: #eef4ff; padding: 10px 20px; display: flex; justify-content: space-between; }
  .subtotal-label { font-size: 11px; font-weight: 900; color: var(--navy-mid); }
  .subtotal-amount { font-size: 13px; font-weight: 900; color: var(--navy-mid); }

  .total-box { background: var(--navy); padding: 24px 20px; display: flex; justify-content: space-between; align-items: center; }
  .total-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.05em; }
  .total-amount { font-size: 38px; font-weight: 900; color: var(--gold); line-height: 1; }

  .bill-footer { padding: 16px 20px; }
  .footer-row { font-size: 11px; color: #888; line-height: 1.8; }
  .footer-contact { font-size: 13px; font-weight: 700; color: var(--navy); margin-top: 8px; }

  .share-btn { display: block; max-width: 480px; margin: 20px auto 0; background: white; border: 1.5px solid #e8e4da; border-radius: 14px; padding: 14px; text-align: center; font-size: 13px; font-weight: 700; color: var(--navy); cursor: pointer; text-decoration: none; }
  .share-btn:active { background: #f5f2ec; }

  .error-box { max-width: 480px; margin: 60px auto; text-align: center; }
  .error-icon { font-size: 48px; margin-bottom: 16px; }
  .error-msg { font-size: 16px; font-weight: 700; color: #555; }

  @media (max-width: 360px) {
    .bill-member-name { font-size: 24px; }
    .total-amount { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">CHOU MEI ROTARY</div>
  <div class="header-title">洲美扶輪社 會費對帳單</div>
</div>

<div id="content">
  <div class="error-box">
    <div class="error-icon">🔄</div>
    <div class="error-msg">載入中...</div>
  </div>
</div>

<script>
function getV(x) { return isNaN(Number(x)) ? 0 : Number(x); }

function calcFees(m) {
  const v = getV;
  const vr = (m?.variable && !Array.isArray(m.variable)) ? m.variable : {};
  // A: 經常費
  const sumA = v(m?.fixedA?.monthly) + (vr.fixedA_list||[]).reduce((a,i)=>a+v(i.amount),0);
  // B: 代付款
  const sumC = (vr.advance_pay_list||[]).reduce((a,i)=>a+v(i.amount),0);
  // C: 服務費（含捐款）
  const sumB = v(m?.fixedB?.monthly_split)
    + (vr.service_list||[]).reduce((a,i)=>a+v(i.amount),0)
    + (vr.donation_fixed_list||[]).reduce((a,i)=>a+v(i.amount),0)
    + (vr.donation_general_list||[]).reduce((a,i)=>a+v(i.amount),0)
    + (vr.donation_list||[]).reduce((a,i)=>a+v(i.amount),0);
  // D
  const sumD = sumA + sumC + sumB;
  // E
  const sumE = v(m?.accounting?.previous_due);
  // F: 匯款
  const sumF = (vr.receipt_list||[]).filter(i=>i.type!=='receipt_card').reduce((a,i)=>a+v(i.amount),0);
  // G: 信用卡
  const sumG = (vr.receipt_list||[]).filter(i=>i.type==='receipt_card').reduce((a,i)=>a+v(i.amount),0)
    + (vr.credit_card_list||[]).reduce((a,i)=>a+v(i.amount),0)
    + v(m?.accounting?.credit_card);
  const H = sumD + sumE - sumF - sumG;
  return { sumA, sumB, sumC, sumD, sumE, sumF, sumG, finalH: H };
}

function renderBill(m, settings) {
  const f = calcFees(m);
  const v = getV;
  const fs = settings.feeStructure;
  const vr = (m.variable && !Array.isArray(m.variable)) ? m.variable : {};
  const sub = (label, amount, bg='#eef4ff', color='#003366') =>
    `<div class="subtotal"><span class="subtotal-label" style="color:${color}">${label}</span><span class="subtotal-amount mono" style="color:${color}">$${v(amount).toLocaleString()}</span></div>`;

  // 經常費 A
  let rowsA = '';
  const fixedALabels = Object.values(fs.fixedA?.items||{}).map(l=>l.trim());
  Object.entries(fs.fixedA?.items||{}).forEach(([k,label]) => {
    const amt = v(m.fixedA?.[k]) || (vr.fixedA_list||[]).filter(i=>i.desc?.trim()===label.trim()).reduce((s,i)=>s+v(i.amount),0);
    if (amt > 0) rowsA += `<div class="bill-row"><span class="bill-row-label">[經常費] ${label}</span><span class="bill-row-amount mono">$${amt.toLocaleString()}</span></div>`;
  });
  (vr.fixedA_list||[]).filter(i=>!fixedALabels.includes(i.desc?.trim())).forEach(i => {
    rowsA += `<div class="bill-row"><span class="bill-row-label">[經常費] ${i.desc}</span><span class="bill-row-amount mono">$${v(i.amount).toLocaleString()}</span></div>`;
  });

  // 代付款 B
  let rowsB = '';
  (vr.advance_pay_list||[]).forEach(i => {
    rowsB += `<div class="bill-row"><span class="bill-row-label">[代付款] ${i.desc}</span><span class="bill-row-amount mono">$${v(i.amount).toLocaleString()}</span></div>`;
  });

  // 服務費 C（含捐款）
  let rowsC = '';
  if (v(m.fixedB?.monthly_split) > 0) rowsC += `<div class="bill-row"><span class="bill-row-label">固定分攤費</span><span class="bill-row-amount mono">$${v(m.fixedB.monthly_split).toLocaleString()}</span></div>`;
  (vr.service_list||[]).forEach(i => { rowsC += `<div class="bill-row"><span class="bill-row-label">[服務費] ${i.desc}</span><span class="bill-row-amount mono">$${v(i.amount).toLocaleString()}</span></div>`; });
  (vr.donation_fixed_list||[]).forEach(i => { rowsC += `<div class="bill-row"><span class="bill-row-label" style="color:#6d28d9">[固定捐款] ${i.desc}</span><span class="bill-row-amount mono" style="color:#6d28d9">$${v(i.amount).toLocaleString()}</span></div>`; });
  (vr.donation_general_list||[]).forEach(i => { rowsC += `<div class="bill-row"><span class="bill-row-label" style="color:#9333ea">[一般捐款] ${i.desc}</span><span class="bill-row-amount mono" style="color:#9333ea">$${v(i.amount).toLocaleString()}</span></div>`; });
  (vr.donation_list||[]).forEach(i => { rowsC += `<div class="bill-row"><span class="bill-row-label" style="color:#9333ea">[捐款] ${i.desc}</span><span class="bill-row-amount mono" style="color:#9333ea">$${v(i.amount).toLocaleString()}</span></div>`; });

  // 收款
  let rowsAdj = '';
  if (f.sumE !== 0) rowsAdj += `<div class="bill-row"><span class="bill-row-label" style="color:#888">前期未付款 (E)</span><span class="bill-row-amount mono" style="color:#888">$${f.sumE.toLocaleString()}</span></div>`;
  (vr.receipt_list||[]).forEach(i => {
    const isCard = i.type === 'receipt_card';
    rowsAdj += `<div class="bill-row credit" style="color:${isCard?'#7c3aed':'#16a34a'}"><span class="bill-row-label">${isCard?'已收信用卡 (G)':'已收匯款 (F)'}</span><span class="bill-row-amount mono">$${v(i.amount).toLocaleString()}</span></div>`;
  });

  const deadlineText = settings.paymentDeadline || '__月__日';

  document.getElementById('content').innerHTML = `
    <div class="bill-card">
      <div class="bill-top">
        <div class="bill-month">${settings.currentMonth} 會費對帳單</div>
        <div class="bill-member-name">${m.name}</div>
        <div class="bill-member-sub">${m.nickname ? m.nickname + ' · ' : ''}${m.id}</div>
      </div>
      <div class="bill-body">
        ${rowsA ? `<div class="section-label">經常費</div>${rowsA}` : ''}
        ${sub('經常費合計 (A)', f.sumA)}
        ${rowsB ? `<div class="section-label">代付款</div>${rowsB}` : ''}
        ${sub('代付款合計 (B)', f.sumC)}
        ${rowsC ? `<div class="section-label">服務費（含捐款）</div>${rowsC}` : ''}
        ${sub('服務費合計 (C)', f.sumB)}
        ${sub('本期社費 (D = A+B+C)', f.sumD, '#002147', '#C9A84C')}
        ${rowsAdj ? `<div class="section-label">調整項目</div>${rowsAdj}` : ''}
        <div class="total-box">
          <div class="total-label">本期未付款 (H = D+E−F−G)</div>
          <div class="total-amount mono">$${f.finalH.toLocaleString()}</div>
        </div>
        <div class="bill-footer">
          <p style="margin-bottom:6px;font-size:12px;color:#333">親愛的洲美扶輪社社友您好：</p>
          <p style="margin-bottom:6px;font-size:12px;color:#333">您 <strong>${settings.currentMonth}</strong> 本期社費合計 (D=A+B+C) 為 <strong style="color:#002147">NT $${f.sumD.toLocaleString()}</strong>，本期未付款 (H) 為 <strong style="color:${f.finalH>0?'#dc2626':'#16a34a'}">NT $${f.finalH.toLocaleString()}</strong>，煩請核對，若有錯誤請於<strong>三天內</strong>告知。謝謝！</p>
          <p style="margin-bottom:6px;font-size:12px;color:#dc2626;font-weight:700">⚠️ 提醒您，本月應收款請於 <strong>${deadlineText}</strong> 前繳清，以避免會籍被終止，謝謝！</p>
          <p style="font-size:11px;color:#555;margin-bottom:4px">□ 核對無誤　　□ 核對有誤，原因（請於三天內告知）：＿＿＿＿＿＿＿＿</p>
          <p style="font-size:11px;color:#555;margin-bottom:12px">請簽名：＿＿＿＿＿＿＿＿</p>
          <div style="background:#f8f8f8;border-radius:8px;padding:10px;margin-bottom:10px;font-size:11px;color:#444;line-height:1.8">
            <strong style="color:#002147">※ 繳費方式</strong><br>
            1.【信用卡】國泰世華（每月15日扣款）<br>
            2.【匯　款】請來電 0972-701003 或Line告知卡號後五碼<br>
            戶名：社團法人臺北市洲美扶輪社<br>
            銀行：國泰世華銀行仁愛分行｜帳號：201-03-500245-1｜代碼：013
          </div>
          <p style="font-size:11px;color:#888;margin-bottom:6px">款項若有錯誤或信用卡扣款金額不符，請立即告知社辦副知財務，將於一週內處理。</p>
          <div class="footer-contact">財務聯絡：${settings.financialContact?.name} ${settings.financialContact?.phone}</div>
        </div>
      </div>
    </div>
    <button class="share-btn" onclick="shareThis()">📤 分享此帳單</button>
  `;
}

function shareThis() {
  if (navigator.share) {
    navigator.share({ title: '洲美扶輪社帳單', url: location.href });
  } else {
    navigator.clipboard.writeText(location.href).then(() => alert('✅ 連結已複製'));
  }
}

// 從 URL 參數讀取資料
function init() {
  const params = new URLSearchParams(location.search);

  // 方式1：URL 直接帶資料（離線分享）
  const rawData = params.get('data');
  if (rawData) {
    try {
      const { m, settings } = JSON.parse(decodeURIComponent(rawData));
      renderBill(m, settings);
      return;
    } catch(e) {}
  }

  // 方式2：從 API 讀取（需要 API_URL）
  const memberId = params.get('id');
  const apiUrl = localStorage.getItem('choumei_api_url');

  if (memberId && apiUrl) {
    fetch(apiUrl + '?action=getAll')
      .then(r => r.json())
      .then(data => {
        if (!data.ok) throw new Error(data.error);
        const m = data.members.find(x => x.id === memberId);
        if (!m) throw new Error('找不到社友資料');
        renderBill(m, data.settings);
      })
      .catch(err => {
        document.getElementById('content').innerHTML = `
          <div class="error-box">
            <div class="error-icon">⚠️</div>
            <div class="error-msg">無法載入帳單資料<br><small style="font-size:12px;color:#aaa;margin-top:8px;display:block">${err.message}</small></div>
          </div>`;
      });
    return;
  }

  // 方式3：從本機 localStorage 讀取
  if (memberId) {
    const members = JSON.parse(localStorage.getItem('choumei_members')||'[]');
    const settings = JSON.parse(localStorage.getItem('choumei_settings')||'null');
    const m = members.find(x => x.id === memberId);
    if (m && settings) { renderBill(m, settings); return; }
  }

  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <div class="error-icon">🔍</div>
      <div class="error-msg">找不到帳單資料<br><small style="font-size:12px;color:#aaa;margin-top:8px;display:block">請確認連結是否正確</small></div>
    </div>`;
}

init();
</script>
</body>
</html>
